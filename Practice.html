<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>practice</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css"> 
</head>
<body>
    <div class = "container">
        <div class = "section-title">
            <h2>Dynamic Product Loading</h2>
            <P>See what the Lord has done</P>
        </div>

        <div class="demo-controls">
            <h3>Demo Controls</h3>
            <div class = "controls-group">
                <label for = "product-count">Number of Products</label>
                <input type = "numbers" id="product-count" value="10" min="1" max="5">
            </div>

            <div class="control-group">
                <label>Filter by Category</label>
                <div class="filter-controls">
                    <button class = "filter-btn active" data-category="all">All Products</button>
                    <button class = "filter-btn" data-category="electronics">Electronics</button>
                    <button class = "filter-btn" data-category="clothing">Clothing</button>
                    <button class = "filter-btn" data-category="books">Books</button>   
                    <button class = "filter-btn" data-category="furniture">Furniture</button>
                </div>
            </div>
            <button id = "Load-Products" class="btn">Load Products</button>

        </div>
        <div class="products-grid">
            <div class="loading">
                <i class = "fas fa-spinner"></i>
                <p>Products will Load Here...</p>
            </div>
        </div>

    </div>

    <script>

        // Sample product data
        const products = [
        {   id: 1,
            name: "Playstation 5 Console",
            category: "Consoles",
            brand: "Sony",
            price: 2500000,
            originalPrice: 3000000,
            image: "https://example.com/ps5.jpg",
            badge: "New",
            description: "The latest gaming console with stunning graphics and performance.",
        }
    ];

    // DOM Elements
    const productsGrid = document.querySelector('.products-grid');
    const loadProductsBtn = document.getElementById('Load-Products');
    const productCountInput = document.querySelector('product-cout');
    const filterButtons = document.querySelectorAll('.filter-btn')

    //Current Filter State
    let currentCategory ='all';
    let displaydProducts = 6;

    //Format price with commas for better readability
    function formatPrice(price){
        return 'MK' +price.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }

    //Generate HTM for a Product card
    function createProductCard(product){
        return `
            <div class = "product-card" data category = "${product.category}">
                ${product.badge ? `<span class ="product-badge">${product.badge}</span>`: ''}
                <div class = "product-image">
                    <img src="${product.image}" alt="${product.name}">
    </script>
</body>
</html>
